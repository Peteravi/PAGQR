<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - PagQR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/admin/assets/css/login.css" rel="stylesheet">
</head>

<body>
    <div class="card login-card">
        <div class="login-header">
            <div class="brand-icon">
                <i class="bi bi-qr-code-scan"></i>
            </div>
            <h1 class="h3 mb-1">PagQR</h1>
            <p class="mb-0">Acceso al panel administrativo</p>
        </div>

        <div class="card-body">
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm" novalidate>
                <input type="hidden" id="next" name="next">
                <input type="hidden" id="csrfToken" name="csrfToken">

                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="Ingresa tu usuario" autocomplete="username" maxlength="80" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Ingresa tu contraseña" autocomplete="current-password" maxlength="150"
                            required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                            aria-label="Mostrar u ocultar contraseña">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-login" id="btnLogin">
                        <span class="spinner-border spinner-border-sm me-2 d-none" id="loginSpinner"></span>
                        Iniciar sesión
                    </button>
                </div>
            </form>

            <div class="footer-note">
                Solo acceso para administrador autorizado.
            </div>
        </div>
    </div>

    <script src="/admin/assets/js/login.js"></script>
</body>

</html>
